name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-artifacts:
    name: Build release artifact (RHEL 9-compatible)
    runs-on: ubuntu-latest
    container:
      image: quay.io/rockylinux/rockylinux:9

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install gcc git make python3 python3-pip tar gzip

      - name: Read version
        id: version
        run: |
          version=$(cat VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="${{ steps.version.outputs.version }}"
          test "$tag" = "$version"

      - name: Build and test
        run: make clean all test

      - name: Package artifact
        run: |
          version="${{ steps.version.outputs.version }}"
          stage="build/release/herofand-$version-rhel9-x86_64"
          mkdir -p "$stage/bin" "$stage/systemd"
          cp build/herofand "$stage/bin/herofand"
          cp systemd/herofand.service "$stage/systemd/herofand.service"
          cp README.md VERSION "$stage/"
          tar -C build/release -czf "build/herofand-$version-rhel9-x86_64.tar.gz" "herofand-$version-rhel9-x86_64"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: herofand-${{ steps.version.outputs.version }}-rhel9-x86_64
          path: build/herofand-${{ steps.version.outputs.version }}-rhel9-x86_64.tar.gz

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/herofand-${{ steps.version.outputs.version }}-rhel9-x86_64.tar.gz
          generate_release_notes: true
