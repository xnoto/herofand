name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-artifacts:
    name: Build release artifact (RHEL 9-compatible)
    runs-on: ubuntu-latest
    container:
      image: registry.access.redhat.com/ubi9/ubi:9.2

    steps:
      - name: Install git for checkout
        run: |
          dnf -y install git

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          cd "$GITHUB_WORKSPACE"
          dnf -y install https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
          dnf -y install gcc make python3 python3-pip tar gzip

      - name: Install packaging tools
        run: |
          cd "$GITHUB_WORKSPACE"
          dnf -y install rpm-build rpmdevtools systemd-rpm-macros

      - name: Read version
        id: version
        run: |
          cd "$GITHUB_WORKSPACE"
          version=$(cat VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd "$GITHUB_WORKSPACE"
          tag="${GITHUB_REF_NAME#v}"
          version="${{ steps.version.outputs.version }}"
          test "$tag" = "$version"

      - name: Build and test
        run: |
          cd "$GITHUB_WORKSPACE"
          make clean all test

      - name: Build RPM
        run: |
          cd "$GITHUB_WORKSPACE"
          version="${{ steps.version.outputs.version }}"
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p /tmp/herofand-$version
          cp -a . /tmp/herofand-$version/
          rm -rf /tmp/herofand-$version/.git /tmp/herofand-$version/build
          tar -czf ~/rpmbuild/SOURCES/herofand-$version.tar.gz -C /tmp herofand-$version
          sed "s/^Version:.*/Version:        $version/" herofand.spec > ~/rpmbuild/SPECS/herofand.spec
          rpmbuild -bb ~/rpmbuild/SPECS/herofand.spec
          mkdir -p build
          cp ~/rpmbuild/RPMS/x86_64/herofand-${version}-1.el9.x86_64.rpm build/

      - name: Package tarball
        run: |
          cd "$GITHUB_WORKSPACE"
          version="${{ steps.version.outputs.version }}"
          stage="build/release/herofand-$version-rhel9-x86_64"
          mkdir -p "$stage/bin" "$stage/systemd"
          cp build/herofand "$stage/bin/herofand"
          cp systemd/herofand.service "$stage/systemd/herofand.service"
          cp README.md VERSION "$stage/"
          tar -C build/release -czf "build/herofand-$version-rhel9-x86_64.tar.gz" "herofand-$version-rhel9-x86_64"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: herofand-${{ steps.version.outputs.version }}-rhel9-x86_64
          path: |
            build/herofand-${{ steps.version.outputs.version }}-rhel9-x86_64.tar.gz
            build/herofand-${{ steps.version.outputs.version }}-1.el9.x86_64.rpm

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/herofand-${{ steps.version.outputs.version }}-rhel9-x86_64.tar.gz
            build/herofand-${{ steps.version.outputs.version }}-1.el9.x86_64.rpm
          generate_release_notes: true
