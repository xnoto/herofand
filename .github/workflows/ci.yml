name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  validate:
    name: Build, test, and lint (RHEL 9-compatible)
    runs-on: ubuntu-latest
    container:
      image: quay.io/rockylinux/rockylinux:9

    steps:
      - name: Install git for checkout
        run: |
          dnf -y install git

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install epel-release
          dnf -y install gcc make python3 python3-pip clang-tools-extra cppcheck

      - name: Install repo checks
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pre-commit

      - name: Mark workspace as safe for git
        run: |
          cd "$GITHUB_WORKSPACE"
          git config --global --add safe.directory '*'
          pwd
          git status --short

      - name: Build and test
        run: |
          cd "$GITHUB_WORKSPACE"
          make clean all test

      - name: Verify RPM builds
        run: |
          cd "$GITHUB_WORKSPACE"
          dnf -y install rpm-build rpmdevtools systemd-rpm-macros
          version=$(cat VERSION)
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p /tmp/herofand-$version
          cp -a . /tmp/herofand-$version/
          rm -rf /tmp/herofand-$version/.git /tmp/herofand-$version/build
          tar -czf ~/rpmbuild/SOURCES/herofand-$version.tar.gz -C /tmp herofand-$version
          sed "s/^Version:.*/Version:        $version/" herofand.spec > ~/rpmbuild/SPECS/herofand.spec
          rpmbuild -bb ~/rpmbuild/SPECS/herofand.spec

      - name: Run pre-commit checks
        run: |
          cd "$GITHUB_WORKSPACE"
          SKIP=no-commit-to-branch pre-commit run --all-files
